name: Build Desktop App

on:
  push:
    branches:
      - main

jobs:
  # Gatekeeper: only let the expensive multi-OS build run if the
  # app's version number has actually changed since the last release.
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read app version from tauri.conf.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if this version was already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if gh release view "app-v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Version $VERSION already has a release. Skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is new. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          # - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Tauri needs a few native libs on Linux that ubuntu-latest
      # doesn't ship with by default.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v${{ needs.check-version.outputs.version }}
          releaseName: "App v${{ needs.check-version.outputs.version }}"
          releaseDraft: true
          prerelease: false
